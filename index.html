<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="popup-container">
    <div class="popup twitch-pop" data-box="enableTwitch">
      <div class="left">
        <span class="icon twitch" aria-hidden="true"></span>
      </div>
      <div class="right">
        <span data-name="twitchUsername"></span>
      </div>
    </div>

    <div class="popup youtube-pop" data-box="enableYoutube">
      <div class="left">
        <span class="icon youtube" aria-hidden="true"></span>
      </div>
      <div class="right">
        <span data-name="youtubeUsername"></span>
      </div>
    </div>

    <div class="popup instagram-pop" data-box="enableInstagram">
      <div class="left">
        <span class="icon instagram" aria-hidden="true"></span>
      </div>
      <div class="right">
        <span data-name="instagramUsername"></span>
      </div>
    </div>

    <div class="popup telegram-pop" data-box="enableTelegram">
      <div class="left">
        <span class="icon telegram" aria-hidden="true"></span>
      </div>
      <div class="right">
        <span data-name="telegramUsername"></span>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
